services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fiscalbridge
      POSTGRES_PASSWORD: fiscalbridge
      POSTGRES_DB: fiscalbridge_development
    ports:
      - "5433:5432"
    volumes:
      - fiscalbridge_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiscalbridge -d fiscalbridge_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        BUNDLE_WITHOUT: ""
        INSTALL_BROWSER: "true"
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    environment:
      RAILS_ENV: development
      SECRET_KEY_BASE: local-development-secret
      POSTGRES_HOST: db
      POSTGRES_USER: fiscalbridge
      POSTGRES_PASSWORD: fiscalbridge
      POSTGRES_DB: fiscalbridge_development
      RATE_LIMIT_REQUESTS_PER_MINUTE: 120
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - fiscalbridge_storage:/app/storage

  jobs:
    build:
      context: .
      args:
        BUNDLE_WITHOUT: ""
        INSTALL_BROWSER: "true"
    command: bundle exec bin/jobs
    environment:
      RAILS_ENV: development
      SECRET_KEY_BASE: local-development-secret
      POSTGRES_HOST: db
      POSTGRES_USER: fiscalbridge
      POSTGRES_PASSWORD: fiscalbridge
      POSTGRES_DB: fiscalbridge_development
      RATE_LIMIT_REQUESTS_PER_MINUTE: 120
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - fiscalbridge_storage:/app/storage

volumes:
  bundle_cache:
  fiscalbridge_postgres:
  fiscalbridge_storage:
