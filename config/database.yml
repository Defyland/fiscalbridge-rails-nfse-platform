default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  host: <%= ENV.fetch("POSTGRES_HOST", ENV.fetch("DATABASE_HOST", "127.0.0.1")) %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  username: <%= ENV.fetch("POSTGRES_USER", ENV.fetch("DATABASE_USER", "postgres")) %>
  password: <%= ENV.fetch("POSTGRES_PASSWORD", ENV.fetch("DATABASE_PASSWORD", "")) %>
  variables:
    statement_timeout: <%= ENV.fetch("POSTGRES_STATEMENT_TIMEOUT_MS", 5000) %>

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB", "fiscalbridge_development") %>

test:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_TEST_DB", "fiscalbridge_test#{ENV['TEST_ENV_NUMBER']}") %>

benchmark:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_BENCHMARK_DB", "fiscalbridge_benchmark") %>

production:
  primary:
<% if ENV["DATABASE_URL"] && !ENV["DATABASE_URL"].empty? %>
    url: <%= ENV["DATABASE_URL"] %>
<% else %>
    <<: *default
    database: <%= ENV.fetch("POSTGRES_PRODUCTION_DB", "fiscalbridge_production") %>
<% end %>
